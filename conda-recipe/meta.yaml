{% set name = "gwtc_analysis" %}
{% set version = "0.4.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/gwtc_analysis/gwtc_analysis-{{ version }}.tar.gz
  sha256: a4ef260d28ae97e9cfb9ec15bfd20ce9aa4dc66358923808a3764d4a7202fd2f

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
requirements:
  host:
    - python 3.11
    - pip
    - setuptools
  run:
    - python >=3.10,<3.13
    - numpy
    - scipy
    - pandas
    - matplotlib
    - astropy
    - h5py
    - healpy
    - requests
    - tqdm
    - pyyaml
    - gwpy
    - gwosc
    - ligo.skymap
    - pesummary
    - pycbc
    - pyseobnr
    - minio

test:
  imports:
    - gwtc_analysis
  commands:
    - python -m gwtc_analysis.cli -h
    - python -m gwtc_analysis.cli search_skymaps -h
    - python -m gwtc_analysis.cli event_selection -h
    - python -m gwtc_analysis.cli catalog_statistics -h
    - python -m gwtc_analysis.cli parameters_estimation -h
    - python -m gwtc_analysis.cli build_unofficial_pe -h
  requires:
    - pip

about:
  home: https://github.com/danielsentenac/gwtc_analysis
  summary: "GWTC Analysis: search skymaps, event selection, catalog statistics, and parameter estimation plotting"
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - danielsentenac
