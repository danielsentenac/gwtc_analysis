name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  docker:
    name: Build and publish Docker image
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: danielsentenac/gwtc-tool
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: danielsentenac/gwtc-tool
          readme-filepath: ./README.md

  pypi:
    name: Build and publish PyPI package
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI with trusted publisher
        if: ${{ env.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to PyPI with API token
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}

  conda:
    name: Build and publish Conda package
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          channels: conda-forge,defaults
          channel-priority: strict

      - name: Install Conda build tools
        shell: bash -el {0}
        run: |
          conda install -y conda-build anaconda-client

      - name: Build Conda package
        shell: bash -el {0}
        run: |
          conda build conda-recipe --output-folder conda-dist

      - name: Require Anaconda token for release publication
        if: ${{ github.event_name == 'release' && env.ANACONDA_API_TOKEN == '' }}
        shell: bash -el {0}
        run: |
          echo "ANACONDA_API_TOKEN secret is required to publish the Conda package." >&2
          exit 1

      - name: Upload Conda package
        if: ${{ env.ANACONDA_API_TOKEN != '' }}
        shell: bash -el {0}
        run: |
          mapfile -t packages < <(find conda-dist -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | sort)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No Conda package artifacts were produced." >&2
            exit 1
          fi
          anaconda -t "$ANACONDA_API_TOKEN" upload \
            --user danielsentenac \
            --label main \
            --skip-existing \
            "${packages[@]}"
